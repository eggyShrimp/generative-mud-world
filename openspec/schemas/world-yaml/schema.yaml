name: world-yaml
version: 1
description: |
  ContentPool 字段 / YAML 世界观文件变更。
  Pure data changes: adding or modifying ContentPool fields, YAML data files.
  No engine logic changes. No TUI changes.

artifacts:
  - id: proposal
    generates: proposal.md
    description: 变更动机和影响范围
    template: proposal.md
    instruction: |
      Create a proposal for this ContentPool/YAML change. You MUST:
      1. State which ContentPool field(s) are added or modified
      2. State the YAML domain (social-dialogue, combat, culture-narrative, etc.)
      3. State whether the field is LLM-evolvable (needs tool + mutation parser + materializer + write-back)
      4. Run `rg "<field>" src/ --type ts | grep -v __tests__` to find all existing consumers
      Do NOT propose engine or TUI code changes.
    requires: []

  - id: design
    generates: design.md
    description: ContentPool 完整链路 checklist 逐条映射
    template: design.md
    instruction: |
      Map the change to the ContentPool field checklist (docs/dev-guide/add-contentpool-field.md).
      For each step, state the file to change and whether it applies.
      If LLM-evolvable: tool definition, tool-call parser, prompt, materializer, write-back, reload tests, and boundary checks apply.
      If not LLM-evolvable: explicitly state which evolution steps are skipped and why.
      Include consumer analysis from the `rg` search.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: 实现任务列表（按 ContentPool 完整链路分组）
    template: tasks.md
    instruction: |
      Generate tasks from the design. Each task must include the exact file path.
      Group tasks by ContentPool type/schema, YAML loading, LLM evolution, materialization, write-back, consumer updates, tests, and boundary checks.
      For every ContentPool path or consumer behavior task, include at least one matching automated test task,
      or explicitly mark why only a manual check is possible.
      Include a verification task that runs lint, tests, depcruise, and consumer check.
    requires:
      - design

  - id: spec
    generates: specs/world-yaml/spec.md
    description: ContentPool 字段需求模板
    template: spec.md
    instruction: |
      Create OpenSpec requirements for the ContentPool field change.
      Requirements MUST cover loading, schema rejection, LLM tool generation if evolvable,
      materialization, evolve write-back, reload persistence, consumer reads, and boundary constraints.
      Each requirement MUST include at least one Scenario.
    requires:
      - design

apply:
  requires: [tasks, spec]
  tracks: tasks.md
