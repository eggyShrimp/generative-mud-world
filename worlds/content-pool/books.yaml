bookContents:
  - id: sutra_copy
    itemTemplateId: sutra_copy
    title: 佛经抄本
    pages:
      - |
        如是我闻。
        一时，众行者宿于沙碛边，夜风吹火，沙声如雨。长者告诸人曰：行远路者，先护其心；心若散乱，虽有清水亦如无水，虽近城郭亦如旷野。

        诸人问曰：何谓护心？长者答曰：见利不急取，见险不轻进，见他人饥渴，不以自满而生慢。若于一念之间能照见贪惧，如掌中观灯，则风沙虽大，不能夺其正念。

        又告之曰：世间路有东西南北，心路亦有四向。向嗔者，步步入火；向痴者，步步入雾；向贪者，步步入缚；向慈悲者，虽行千里，不离安处。是故行者当日省其身，夜省其语，困乏时省其念。

        诸人闻已，各敛衣坐。有人思家，有人忧盗，有人恐明日无水。长者复言：忧来则知忧，恐来则知恐；知其来处，则不为其牵。譬如驼铃随风而响，闻者知铃在驼，不谓风中自有铃声。
      - |
        一切有为法，如梦幻泡影。
        如露亦如电，应作如是观。若见绿洲，勿以为常住；若见荒丘，勿以为永苦。水满则溢，月圆则缺，城池兴坏，商旅往还，皆随因缘而起，随因缘而灭。

        行者若于路上失伴，当先定息。息定则耳聪，耳聪则闻远铃；息乱则心迷，心迷则近井亦不可见。若遇饥渴，当分其粮水，不令弱者独受其苦。布施一瓢之水，胜于空诵千偈而不动心。

        若有人问：沙海无边，何处是岸？当答：不起害心即是岸，不弃同伴即是岸，不以恐惧驱使恶语即是岸。岸不在远处，亦不在城门之内；能于此刻止恶修善，脚下便稍得安稳。

        复有偈曰：尘起知风动，心惊知念生；一灯传一灯，暗路亦分明。愿持此卷者，读至困顿处，先合掌默念三息，然后再行。三息虽短，足以使刀口之言不出，足以使失路之足不乱。
  - id: caravan_route_notes
    itemTemplateId: caravan_route_notes
    title: 商道札记
    pages:
      - |
        从阳关向西，第一日宜随烽燧而行。
        若见北风卷黄沙，不可贪近路，应退回驿井等候商队。

        出关前清点三事：水袋、驼草、火石。水袋不可只数满袋，也要查缝线和木塞；驼草不可只看捆数，也要摸其干湿；火石须分两处藏，莫与油布同包。同行若有新手，令其背最轻之包，走在队中，不可让他独行队尾。

        第一夜若宿废燧，驼队作半月形，头驼在内，货驼在外，火堆不可离帐太近。守夜分三更，第一更防人，第二更防兽，第三更防自己昏睡。听见远处铃声，不可立刻应声，先灭明火，再遣两人同往。

        井水带碱味者，可先盛入陶盆，待沙沉后再饮。井台若被流沙埋住，勿令多人一齐踩上；取长杆探实，再以空袋铺地。凡取水，先人后驼，先病弱后健壮。若有人争水，队首当即止之，争水之队，未至第二井便散。

        记住一句旧话：出关时少带一匹绫，不会死人；少带一袋水，会。货可失，价可亏，名声可慢慢修，唯有渴死之人不能再还价。
      - |
        高昌以西，葡萄沟可补水，胡商坊可换铜钱。
        夜宿时驼铃不可尽摘，铃声能提醒守夜人有兽群接近。

        入胡商坊，先收刀柄，后开货箱。问价时勿围柜台，三人足矣；其余人看驼、看门、看街角。换铜钱须验边纹，波斯银币须听其声，若钱面油亮而手感发黏，多半是新近洗过的假旧钱。

        买水先问价，问价不还价；买路先问人，问人不问两遍。若有人主动拍胸，说知近路，须看他的鞋。鞋底无沙者，不走远路；鞋面新油者，常在城中骗人。真正识路的人，说话不急，也不会催你天黑前动身。

        葡萄沟补水之后，莫贪蒲桃酒。酒暖时甜，入夜后使人口渴，第二日脚步虚浮。若必须饮酒，只许队中无守夜之人饮半盏，且饮后不得近货箱。曾有商队因一坛酒失了三匹驼，莫把笑谈当作小事。

        常用胡语数句记于此：问水，须先举空袋；问草，须指驼口；谢主人，右手按胸。发音不准尚可，神色轻慢不可。商道上能少结一怨，便多一条回头路。
      - |
        若要南下于阗，须备两日清水。
        玉河渡口看似平缓，春汛时却能吞没整匹骆驼。

        渡河之前，先问三日天气。山上若有新雪，河面虽低，夜半也会涨水。浅滩细白如盐者，不可轻信；远看是硬地，脚下多是软泥。以长杆探三处，三处皆实，方可令空驼先行。载货驼不可走第一步，贵货不可置最低箱。

        过河时人不喊，驼不催。牵绳者走上游，扶货者走下游，若有一箱入水，先救人，后救账册，最后救货。货湿尚可晒，人若被水卷走，十匹绫也换不回。

        渡口石桩若刻月牙，三日内有人平安过河；若月牙被刮去，便等本地摆渡人回来。有人说等一日误商机，此话不可听。商机误一日仍是商机，性命误一次便无下一次。

        于阗道上，玉商多，谎价也多。见玉先看裂，不看光；问价先问斤，不问块。若带新手入市，令其只听不语。初到之人眼热手快，最易把半月口粮换成一块不中用的石头。
  - id: herb_manual
    itemTemplateId: herb_manual
    title: 草药手册
    pages:
      - |
        沙地草药多伏于石根。
        晨露未干时采下，药性清凉；日中过后采下，苦味加重。

        辨药先辨土。灰白砂地，多生耐旱小草，叶薄而韧，汁少味涩；红褐石缝，多藏苦根，根皮粗裂，入药前须浸洗三遍。近水阴地所生者，叶肥而性寒；向阳坡上所生者，茎短而气烈。不可只凭花色认药，花易随时令变，根叶之形较可信。

        采药须带小刀、麻线、薄布、陶瓶。根药去土不去皮，叶药去虫不揉碎，花药不可压在重物之下。若不知其名，宁可弃之，不可试于口舌。凡入口之药，先观色，再嗅气，最后取米粒大小试于舌尖；麻、辣、腥、甜得异常者，皆须慎用。

        晨采之药，多含露气，宜治燥热；午采之药，受日气，宜散寒湿；夜间不可采药，露重难辨，蛇虫亦多。若行路急迫，至少记下所采之地、时辰、土色，免得次日煎药时混作一包。

        药虽有用，不可代水粮。远行之人若因疲乏而头晕，先令其坐阴处，解衣领，饮温水；半刻仍不缓，再议用药。误把劳倦当病，药越多，人越虚。
      - |
        胡杨根旁常有止血小草，叶尖微红。
        若叶背生白绒，可敷伤口；若有腥气，不可入口。

        止血小草，叶三至五枚成簇，叶尖微红，茎贴地而生。采时取嫩叶，不取老根。用法：以清水洗净，捣至出汁，以薄布隔敷伤处；血止后即换干布，不可令草泥久贴。若伤口深，先压迫止血，后寻医者缝合，切不可把草药塞入深处。

        叶背白绒者可外敷，叶背光滑而有腥气者不可用。两者常同生于胡杨根旁，最易误采。辨不清时，以水揉叶，白绒者汁淡而涩，腥气者汁滑且味重。误用腥叶，轻则伤口发痒，重则红肿溃烂。

        伤者若口渴难忍，不可令其猛饮。先润唇，再小口饮温水。若面色苍白、额冷、言语断续，须使其平卧，垫高双足，少搬动。此时最忌围观喧哗，也忌灌酒壮胆。酒能乱脉，不能补血。

        伤处若沾沙，勿以干布硬擦。先以清水缓缓冲去，再按压。水少时，可用煮沸后冷却的茶汤代之，但茶渣不可入伤。包扎后每半日查看一次，若热痛加重，须解开重洗，不可只在外面添布。
      - |
        葡萄沟民间常以茶砖调药。
        茶汤能压住草药寒性，但病人虚弱时不可多饮。

        茶砖可暖胃、去腥、压苦味，然不可滥用。寒腹泄泻者，可取淡茶半盏送药；口干舌燥、目赤心烦者，不宜浓茶。凡病人虚弱，茶宜淡，药宜缓，食宜少而频。若一剂未见效，不可急加三倍，药力过猛，正气先伤。

        蒲桃酒可洗刀针，不可给失血者壮胆。酒入口则心跳急，血更难止。若需洗器，先以火烤，再以酒拭，待气散后使用。布带若旧，须煮；针若锈，宁弃不用。行囊中常备干净薄布，比多带一包怪药更要紧。

        小儿、老人、久病之人，用药减半；孕妇不可轻服苦寒之药；饥饿者先食薄粥，再服药。药后若呕吐不止，停药，以温水漱口，少量多次饮水。若发热三日不退，或神志昏乱，不可再凭手册自断，须求医者。

        远行治病，先问四事：何时起病，吃过何物，走过何地，睡过几时。四事不明，药方不可定。能早停下、早包扎、早避风、早睡一觉，常胜过奇药。切记：药救一时，养护救全程。
