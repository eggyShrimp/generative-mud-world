# 探索模板 (规则降级，LLM 可演化)
# 丝路主题

roomTemplates:
  - culture: 丝路商队
    rooms:
      - { name: 驼队驿站, desc: "夯土围墙的方形院落，几十头骆驼卧在墙角反刍。天井中央有一口水井，辘轳吱呀作响。客房是大土炕铺着旧毡子，墙上钉着各色商号的印记。" }
      - { name: 沙漠巴扎, desc: "露天摊位上摆着波斯银器、于阗玉石和大食香药。讲价声以三种语言同时进行，没有人觉得奇怪。一阵沙风吹过，所有人都下意识地捂住了货。" }
      - { name: 废弃驿站, desc: "屋顶塌了一半的驿站，土墙上还有焦黑的火迹。马槽里长出了骆驼刺，井水已经干涸。角落里丢着几个破损的货箱。" }
      - { name: 渡口集, desc: "河岸边的临时集市，摆渡的木船系在胡杨桩上。采玉人在冰冷的河水中弯腰摸索，岸边堆着大大小小的筛网和石料。" }
    names: [康大, 安嫂, 曹驼头, 石老, 何玉匠]
    personalities: [精明世故, 沉默寡言, 热情好客, 警惕陌生人, 爱讲故事]

  - culture: 绿洲城邦
    rooms:
      - { name: 城门关, desc: "生土筑成的城门，门洞深长。守卒盘查货物和通关文书，墙根下蹲着等待入城的商贩，骆驼不耐烦地打着响鼻。" }
      - { name: 胡商坊, desc: "木质招牌在干热的风中摆动，窄巷深处飘着异域香料的暖香。粟特人坐在柜台里拨算盘，墙上挂着吐火罗文的账目。" }
      - { name: 葡萄园, desc: "坎儿井的融雪冰水流过每一株葡萄根。绿叶掩映的土院里有几个陶缸，缸里是去年酿的蒲桃酒。一只懒猫在井栏上晒太阳。" }
      - { name: 佛寺石窟, desc: "崖壁上凿出的长方形洞窟，前室供着佛陀塑像，后室墙壁上绘着千佛。窟内阴凉干燥，壁画用青金石蓝和赭石红，历经百年依然明艳。" }
    names: [麴公, 裴娘, 阿史那, 白家, 迟公]
    personalities: [通达圆滑, 虔诚安静, 傲慢矜持, 朴实憨厚, 机敏灵巧]

  - culture: 大唐戍堡
    rooms:
      - { name: 烽燧, desc: "矗立在戈壁高地上的夯土塔台，狼烟灶里堆着干骆驼粪。守卒在台顶瞭望，五色令旗插在箭垛旁，不远处是下一个烽燧的模糊轮廓。" }
      - { name: 军营, desc: "木栅围成的方形营寨，帐幕排成直线。操练场上尘沙飞扬，戈矛的寒光在阳光下闪烁。中军帐前飘着褪色的唐字旌旗。" }
      - { name: 边关驿, desc: "大道边的一排土屋，驿马在马厩里吃草。驿卒坐在门口登记往来文书，墙上贴着旧的安西军报，墨迹已经淡了。" }
    names: [张校尉, 王戍卒, 李斥候, 赵军士]
    personalities: [沉默坚毅, 思乡忧心, 豪爽仗义, 谨慎多疑]

  - culture: 荒漠废墟
    rooms:
      - { name: 沙埋古城, desc: "黄沙半掩的残垣断壁。有的墙壁被风沙掏空成窟窿，风声穿过时发出哀鸣。地面上散落着碎陶片和腐朽的木简，一座佛塔从沙丘中露出早已崩毁的尖顶。" }
      - { name: 干涸绿洲, desc: "胡杨枯死了不知道多少年，惨白的枝干扭曲着指向天空。泉眼被沙填平了，只剩下几间半地穴的土屋遗迹。" }
      - { name: 驼骨滩, desc: "大漠中的一片白骨地，散落着骆驼和马的骨骸。风化的鞍具残片挂在枯枝上，一只蜥蜴从眼眶中爬出来，毫无顾忌地晒着太阳。" }
    names: [独行旅人, 沙漠隐者, 疯修士, 寻宝客]
    personalities: [沉默疯魔, 看破红尘, 贪婪冒险, 谨慎恐惧]
