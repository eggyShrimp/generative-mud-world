# 需求定义 + 行为效果 + 需求→行为映射
# 丝路主题

needDefinitions:
  - type: hunger
    baseUrgency: 0.5
    decayRate: 5
    description: 对食物的需求
    bornFrom: baseline
  - type: safety
    baseUrgency: 0.4
    decayRate: 2
    description: 对人身安全的需求
    bornFrom: baseline
