    name: 米继芬
    roomId: room_sogdian_quarter
    personality: 粟特裔丝绸商，手指上戴着三个民族的戒指。精明而谨慎，说话永远留三分余地。康老掌柜是他的老对手，也是老朋友。听说康老病了，他看起来并不惊讶。
