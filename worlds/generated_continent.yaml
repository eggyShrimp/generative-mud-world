    roomId: room_music_dance_hall
    personality: 龟兹最负盛名的乐师，琵琶技艺名震西域。但他脸色苍白，眼中藏着恐惧——吐蕃密探前几天找上门来，威胁他盗取龟兹国宝级乐谱《摩诃兜勒》，否则就伤害他的家人。
