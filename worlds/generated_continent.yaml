  - id: npc_ayi_guli
    name: 阿依古丽
    roomId: room_music_dance_hall
    personality: 年轻的龟兹舞伎，胡旋舞跳得让看客忘了茶凉。心思灵巧，知道苏毗摩最近总是半夜出门、回来后就不说话。她担心他，却不敢问。
    npcTier: background
    role: dancer
    traits:
