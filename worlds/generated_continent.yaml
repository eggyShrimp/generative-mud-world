name: 安西大都护府
seed: 中晚唐时期，大唐在西域的影响力正在衰退。东起敦煌，西至葱岭，丝绸之路串联着一座座绿洲城邦。吐蕃帝国从南线不断蚕食，大食的势力自西渗透，各城邦在列强夹缝中摇摆求生。商队、僧侣、戍卒和密探在这片大漠中匆匆穿行，每个人都有自己的使命与秘密。
era: 大历十二年
regions:
  - id: region_dunhuang
    name: 敦煌郡
    dominantCulture: 大唐边塞
    prosperity: 65
