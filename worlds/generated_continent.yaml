    dominantCulture: 安西军镇
    prosperity: 40
    threatLevel: 80
  - id: region_taklamakan
    name: 大漠深处
    dominantCulture: 流沙之海
    prosperity: 15
    threatLevel: 75
rooms:
  - id: room_dunhuang_mogao
    name: 莫高窟
    regionId: region_dunhuang
    description: 鸣沙山东麓的断崖上，密布着数百座石窟。崖壁在夕阳下泛着金光，洞窟内壁画斑斓，飞天与千佛在幽暗中若隐若现。香火混合着干燥的沙土气息，远处传来隐约的诵经声。
    tags:
      - temple
  - id: room_yangguan_station
    name: 阳关驿站
    regionId: region_dunhuang
    description: 夯土筑成的驿站院落，大院的井辘轳吱呀作响。驿卒在廊下打盹，马槽边拴着几匹汗湿的驿马。墙上贴着褪色的安西军报，一张粗糙的木桌旁聚着几个等待通关的旅人。
    tags:
      - caravanserai
  - id: room_dunhuang_bazaar
    name: 沙州市集
    regionId: region_dunhuang
    description: 宽敞的土路两旁挤满了摊位，胡汉商贩的叫卖声此起彼伏。丝绸、香料、玉石和铜镜在阳光下闪烁。空气中弥漫着烤馕和药草的混合气味，驼铃声从南来北往的商队中传出。
    tags:
      - bazaar
  - id: room_yumen_beacon
    name: 玉门烽燧
    regionId: region_dunhuang
    description: 矗立在戈壁高地上的烽火台，夯土台基被风沙打磨得棱角圆润。台顶的狼烟灶里堆着干骆驼粪，五色令旗在风中猎猎作响。从这里可以望见东西两道蜿蜒的烽燧线消失在天际。
    tags:
      - garrison
  - id: room_gaochang_gate
    name: 高昌城门
    regionId: region_gaochang
    description: 厚实的生土城墙开着一道拱形城门，门洞深约三丈。守门士卒盘查着每个出入的商队，驼背上卸下来的货箱堆在门洞两侧。门楣上挂着褪色的汉文和吐火罗文匾额。
    tags:
      - garrison
  - id: room_sogdian_quarter
    name: 胡商坊
    regionId: region_gaochang
    description: 窄巷交错的蕃坊区，木骨泥墙的店铺插着各色幡旗。粟特人坐在门前的土炕上拨算盘，柜台上摊着龟兹锦、波斯银币和于阗玉石。巷子深处飘出蒲桃酒的甜香，有人弹着琵琶哼着异域调子。
    tags:
      - bazaar
  - id: room_grape_valley
    name: 葡萄沟
    regionId: region_gaochang
    description: 火焰山峡谷中的绿洲村落。成排的葡萄架延伸到山脚下，山泉顺着坎儿井流进院子。泥屋前的土炕上铺着色彩鲜艳的地毯，老人在阴凉处摇着纺车。
    tags:
      - farm
  - id: room_jiaohe_temple
    name: 交河佛寺
    regionId: region_gaochang
    description: 在台地上挖出的寺院，大殿从生土中凿出。佛陀塑像历经风沙依然肃穆，墙壁上的千佛壁画色泽如新。庭院里一株老桑树遮出大片荫凉，几个僧人在树下译经抄卷。
    tags:
      - temple
  - id: room_kuche_royal_city
    name: 龟兹王城
    regionId: region_kuche
    description: 被白杨树环绕的城池，宫墙粉着白垩，在阳光下耀眼如雪。城门口立着两尊石狮子，胡服侍从牵着骏马进出。王宫方向隐约传出筚篥与羯鼓之声。
    tags:
      - palace
  - id: room_music_dance_hall
    name: 乐舞坊
    regionId: region_kuche
    description: 穹顶土屋的大厅，地上铺着波斯地毯。墙壁上绘满了舞动的伎乐天，一面铜镜正对门口。琵琶、筚篥、竖箜篌挂在架子上，空气中残留着沉香和脂粉的气味，似乎刚刚散了一场宴乐。
    tags:
      - tavern
  - id: room_kizil_caves
    name: 克孜尔石窟
    regionId: region_kuche
    description: 悬崖上开凿的百余座洞窟，栈道悬空连接。石窟内壁画以青金石蓝为主色，菱格画中描绘着佛本生故事。一些洞窟明显被人翻动过，散落的颜料罐和草稿显示画师刚离开不久。
    tags:
      - temple
  - id: room_tiemen_pass
    name: 铁门关
    regionId: region_kuche
    description: 两山夹峙的狭窄隘口，关口用条石砌成，铁皮包裹的木门半掩着。隘口两侧的崖壁上凿有箭垛，地面散落着断箭和马蹄铁。风从关外灌进来，发出低沉的呜呜声，像是谁在低声警告。
    tags:
      - mountain_pass
  - id: room_jade_river_ford
    name: 玉河渡口
    regionId: region_khotan
    description: 喀拉喀什河宽阔的河床上铺满了鹅卵石。每逢秋季，采玉人便卷起裤腿在冰冷的河水中摸索。渡口边搭着几个芦苇棚，摆渡的木船系在岸边的胡杨木桩上。
    tags:
      - river
  - id: room_khotan_palace
    name: 于阗王宫
    regionId: region_khotan
    description: 土坯和木构混合的宫室群落，墙面上贴着金箔残片。大殿地上铺着于阗自产的织锦，王座背后挂着一幅巨大的于阗王礼佛图。空气中混合着檀香和清甜的桑葚酒味，侍臣在廊下低声交谈。
    tags:
      - palace
  - id: room_jade_bazaar
    name: 玉石巴扎
    regionId: region_khotan
    description: 沿河摆开的上百个石料摊位，摊主蹲在毡子上，手中攥着油亮的羊脂玉。打磨玉石的石砣转动声不绝于耳，玉石匠人对着阳光检查原石的纹理。买家在摊位间往来比价，交易在低声和简单手势中完成。
    tags:
      - bazaar
  - id: room_silk_workshop
    name: 桑蚕坊
    regionId: region_khotan
    description: 连排的土坯作坊里，蚕匾叠成几层。女工们熟练地缫丝、络丝，手中的梭子织出精美的联珠纹锦。庭院里晾着刚染好的丝帛，色彩从茜草红到靛蓝，层层叠叠如同凝固的彩虹。
    tags:
      - workshop
  - id: room_kashgar_barracks
    name: 疏勒军营
    regionId: region_kashgar
    description: 用夯土和木栅围成的方形军营，营内帐幕排列整齐。练兵场上数十名戍卒正在操练，戈矛碰撞声整齐划一。中军大帐前立着安西都护府的旌旗，旗上的"唐"字已经褪色。空气中弥漫着皮革、铁锈和马汗的气息。
    tags:
      - garrison
  - id: room_congling_road
    name: 葱岭驿道
    regionId: region_kashgar
    description: 帕米尔高原东麓的古道，碎石路面被千百年来往的驼队磨得发亮。道旁的里程碑上模糊刻着"距疏勒十里"。远处的慕士塔格峰白雪皑皑，近处几只旱獭在石头间探头张望。风从这里出发，一路向东吹向整个西域。
    tags:
      - mountain_pass
  - id: room_zoroastrian_shrine
    name: 祆祠
    regionId: region_kashgar
    description: 低矮的土石结构建筑，正门朝东以便迎接日出。祠内常年燃着圣火，火坛四周供着石榴和胡麻。墙上刻着带翼日轮的图案，空气中弥漫着乳香和没药的气味。祭司在火前喃喃念着阿维斯塔经文。
    tags:
      - temple
  - id: room_border_market
    name: 边境市集
    regionId: region_kashgar
    description: 靠近葱岭的无序集市。摊位上摆放着费尔干纳的汗血马鞍、波斯的玻璃器皿和大食的铜壶。来自不同方向的商人在这里碰头，交换货物、消息和货币。讲价声中夹杂着波斯语、粟特语、突厥语和汉语，没人对任何交易大惊小怪。
    tags:
      - bazaar
  - id: room_loulan_ruins
    name: 楼兰废墟
    regionId: region_taklamakan
    description: 黄沙半掩的古城废墟。倾颓的土墙上，风蚀出诡异的孔洞，沙子在其中呜咽，像是某种断续的低语。一座佛塔从沙丘中露出尖顶，周围散落着木简和陶片。入夜后，废墟中有微弱的磷光闪烁，仿佛这座城市仍不甘心被遗忘。
    tags:
      - ruins
  - id: room_desert_oasis
    name: 沙漠绿洲
    regionId: region_taklamakan
    description: 沙海中的一滴水。百余株胡杨环绕着一汪清泉，树荫下长着小片的芦苇和骆驼刺。泉边有几间半地穴式的土屋，井边放着陶罐。这里是穿越沙漠的生命线，但有人在此不怀好意地盘踞。
    tags:
      - oasis
  - id: room_caravan_camp
    name: 驼队营地
    regionId: region_taklamakan
    description: 一排柳条帐篷围成圆圈，几十头骆驼卧在沙地上反刍。中央的篝火上吊着一口黑铁锅，煮着砖茶和羊肉。帐篷边的箱子上印着各种商号的烙印，货主们围坐在篝火边抽着铜烟锅，低声交换前方道路的消息。
    tags:
      - caravanserai
