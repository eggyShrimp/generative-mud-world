    name: 阿史那
    roomId: room_sogdian_quarter
    personality: 突厥裔中间商人，个子魁梧，笑起来声音洪亮。他的人脉从高昌一直延伸到葱岭以西的突厥部落。近来做生意越来越难，吐蕃人在南边堵住了他的老路。他缺一个能帮他疏通的人。
